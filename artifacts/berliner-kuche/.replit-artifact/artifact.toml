kind = "web"
previewPath = "/"
title = "Berliner Küche"
version = "1.0.0"
id = "artifacts/berliner-kuche"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21826

[services.development]
run = "pnpm --filter @workspace/berliner-kuche run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/berliner-kuche", "run", "build" ]
publicDir = "artifacts/berliner-kuche/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21826"
BASE_PATH = "/"
